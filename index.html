<style>
  :root { --bg:#0c0c0c; --fg:#ededed; --muted:#9a9a9a; --red:#e21c1c; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
         -webkit-font-smoothing:antialiased; line-height:1.5; }
  .wrap { max-width:760px; margin:0 auto; padding:28px 20px 60px; }
  .hero { width:100%; border-radius:14px; display:block; box-shadow:0 10px 40px rgba(0,0,0,.6); }
  h1 { font-size:13px; letter-spacing:.35em; color:var(--muted); font-weight:600;
       text-transform:uppercase; margin:34px 0 6px; }
  .tag { color:var(--red); font-weight:700; letter-spacing:.06em; margin:0 0 24px; }
  .btns { display:flex; flex-wrap:wrap; gap:12px; margin:24px 0 8px; }
  .btn { flex:1 1 220px; text-align:center; text-decoration:none; padding:16px 20px;
         border-radius:10px; font-weight:700; letter-spacing:.04em; font-size:16px; }
  .btn-primary { background:var(--red); color:#fff; }
  .btn-ghost { border:1px solid #333; color:var(--fg); }
  .btn:hover { opacity:.88; }
  .sep { height:1px; background:#222; margin:34px 0; }
  .lbl { font-size:11px; letter-spacing:.3em; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
  .links { display:flex; flex-wrap:wrap; gap:10px 22px; }
  .links a { color:var(--fg); text-decoration:none; border-bottom:1px solid var(--red); padding-bottom:2px; font-size:15px; }
  .links a:hover { color:var(--red); }
  .foot { margin-top:38px; color:var(--muted); font-size:13px; }
  .foot a { color:var(--fg); text-decoration:none; border-bottom:1px solid #444; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="hero" src="og.jpg" alt="FORMEX — DJ Hardcore">

    <h1>Press Kit — 2026</h1>
    <p class="tag">Hardcore will never die.</p>

    <div class="btns">
      <a class="btn btn-primary" href="FORMEX_Presskit_2026.pdf" target="_blank" rel="noopener">📄 Voir le press kit</a>
      <a class="btn btn-ghost" href="FORMEX_Presskit_2026.pdf" download>⬇ Télécharger le PDF</a>
    </div>

    <div class="sep"></div>

    <div class="lbl">Écouter & suivre</div>
    <div class="links">

      <a href="https://www.tiktok.com/@formex____" target="_blank" rel="noopener">TikTok ↗</a>
      <a href="https://linktr.ee/formex____" target="_blank" rel="noopener">Linktree ↗</a>
    </div>

    <div class="foot">
      Booking / Management — <a href="mailto:circle.lille@gmail.com">circle.lille@gmail.com</a>
    </div>
  </div>
</body>
